<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <title>Frontend Mentor | Typing Speed Test</title>
        <link rel="stylesheet" href="./css/style.css" />
    </head>
    <body>
        <!-- top nav section -->
        <nav class="nav-container">
            <img src="./assets/images/logo-large.svg" class="logo-large" />
            <div class="container">
                <img src="./assets/images/icon-personal-best.svg" alt="" />

                <span class="title">Personal Best: </span>
                <span class="bolds"><span id="best-wpm">0</span> WPM</span>
            </div>
        </nav>

        <!-- selector section -->
        <main class="main-container">
            <div class="container">
                <ul class="section-content">
                    <li>
                        <span class="title">WPM:</span>
                        <span class="ty-wpm" id="display-wpm">0</span>
                    </li>
                    <li>
                        <span class="title">Accuracy:</span>
                        <span class="ty-accuracy"
                            ><span id="display-accuracy"> 100 </span> %</span
                        >
                    </li>
                    <li>
                        <span class="title">Time:</span>
                        <span class="ty-timer" id="display-timer">0</span>
                    </li>
                </ul>
            </div>
            <div class="container">
                <div class="lvl-container">
                    <span class="title">Diffculty: </span>
                    <button class="btn diff-btns">Easy</button>
                    <button class="btn diff-btns clicked">Medium</button>
                    <button class="btn diff-btns">Hard</button>
                </div>
                <div class="mode-container">
                    <span class="title">Mode: </span>
                    <button class="btn mode-btn clicked">Timed</button>
                    <button class="btn mode-btn">Passage</button>
                </div>
            </div>
        </main>

        <!-- Typing section -->
        <section class="hero-content">
            <div id="text-display" class="container"></div>
            <input type="text" id="user-input" autofocus />
        </section>

        <!-- modal box -->
        <section>
            <div id="result-modal" class="modal hidden">
                <img
                    src="./assets/images/pattern-star-1.svg"
                    alt=""
                    class="star-1"
                />
                <img
                    src="./assets/images/pattern-star-2.svg"
                    alt=""
                    class="star-2"
                />
                <img
                    src="./assets/images/icon-completed.svg"
                    class="correctImg"
                />

                <h1>Baseline Established!</h1>
                <p class="descBar">
                    You've set the bar. Now the real challenge begins - time to
                    beat it.
                </p>

                <div class="container">
                    <ul class="section-content">
                        <li class="card">
                            <span class="title">WPM:</span>
                            <h3 id="final-wpm">0</h3>
                        </li>
                        <li class="card">
                            <span class="title">Accuracy: </span>
                            <h3 id="final-accuracy">100</h3>
                        </li>
                        <li class="card">
                            <span class="title">Characters: </span>
                            <h3 id="final-cha"></h3>
                        </li>
                    </ul>
                </div>

                <button class="restart-btn" id="re-btn">
                    Beat This Score
                    <img src="./assets/images/icon-restart.svg" />
                </button>
            </div>
        </section>

        <!-- <h4>Start Typing Test Or click the text and start typing</h4>
            <h4>
                Test Complete! Solid run. Keep pushing to beat your high score.
                WPM:
            </h4>
            <h4>Accuracy: Characters: Go Again</h4> -->

        <div class="attribution">
            Challenge by
            <a href="https://www.frontendmentor.io?ref=challenge"
                >Frontend Mentor</a
            >. Coded by <a href="#">Khant Pyae Htoo</a>.
        </div>
    </body>

    <script src="./js/main.js" type="module"></script>
</html>
